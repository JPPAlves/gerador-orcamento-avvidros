<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Orçamento</title>

<link rel="icon" href="./logo.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
.preview-container {
    width: 100%;
    overflow-x: auto;
    background-color: #6b7280;
    padding: 20px;
    border-radius: 8px;
}

#pdf-content {
    font-family: Arial, sans-serif;
    width: 794px;
    min-height: 1123px;
    padding: 40px;
    background: white;
    margin: 0 auto;
    box-sizing: border-box;
}

table {
    width: 100%;
    border-collapse: collapse;
}

.pdf-table th {
    background-color: #f3f4f6;
    padding: 10px;
    border: 1px solid #ccc;
}

.pdf-table td {
    padding: 10px;
    border: 1px solid #ccc;
}

.quebra-pagina {
    break-before: page;
    page-break-before: always;
}
</style>
</head>

<body class="bg-gray-100 p-6">

<div class="flex flex-col xl:flex-row gap-6">

<!-- FORM -->
<div class="bg-white p-4 rounded shadow w-full xl:w-1/3">
<input id="cliente" placeholder="Nome cliente" class="w-full border p-2 mb-2">
<button onclick="addItem()" class="bg-gray-200 w-full p-2 mb-2">+ Item</button>
<button onclick="generatePDF()" class="bg-blue-600 text-white w-full p-3">Gerar PDF</button>
</div>

<!-- PREVIEW -->
<div class="w-full xl:w-2/3">
<div class="preview-container">

<div id="pdf-content">

<h1 style="font-size:22px;font-weight:bold;">ORÇAMENTO</h1>

<p><strong>Cliente:</strong> <span id="prev-cliente"></span></p>

<div id="tabela"></div>

<p style="margin-top:20px;"><strong>Total:</strong> <span id="total"></span></p>

</div>

</div>
</div>

</div>

<script>
let items = [];

function addItem(){
    items.push({desc:"Item", valor:100});
    render();
}

function render(){
    document.getElementById('prev-cliente').innerText =
        document.getElementById('cliente').value;

    let html = '<table class="pdf-table"><tr><th>Item</th><th>Valor</th></tr>';
    let total = 0;

    items.forEach(i=>{
        html += `<tr><td>${i.desc}</td><td>${i.valor}</td></tr>`;
        total += i.valor;
    });

    html += '</table>';

    document.getElementById('tabela').innerHTML = html;
    document.getElementById('total').innerText = total;
}

function generatePDF(){
    const element = document.getElementById('pdf-content');

    const opt = {
        margin: 0,
        filename: 'orcamento.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3, useCORS: true },
        jsPDF: { unit: 'px', format: [794,1123] },
        pagebreak: { mode: ['css','legacy'] }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
